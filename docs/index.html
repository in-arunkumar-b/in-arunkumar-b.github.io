<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Arunkumar</title>
    <style type="text/css">
        body, html
        {
            height: 100%;
            margin: 0;
        }

        .bgimg
        {
            background-image: url('https://arunkumar.ind.in/assets/images/animals/business-pug-working-on-laptop.jpg');
            height: 100%;
            background-position: center center;
            background-size: 70%;
            background-repeat: no-repeat;
            position: relative;
            font-family: "Courier New", Courier, monospace;
            font-size: 25px;
        }

        .middle
        {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        hr
        {
            margin: auto;
            width: 40%;
        }
    </style>
</head>
<body>
    <div class="bgimg">
        <div class="middle">
            <h1>Under construction</h1>
            <hr>
        </div>
    </div>
</body>
</html>
